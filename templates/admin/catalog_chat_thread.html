<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Диалог — {{ project.name }}</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f7fa; margin: 0; color: #111; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 24px; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; margin-bottom: 14px; }
    .msg-user { border-left: 4px solid #2563eb; padding-left: 12px; }
    .msg-assistant { border-left: 4px solid #16a34a; padding-left: 12px; }
    .role { font-size: 12px; color: #6b7280; margin-bottom: 6px; }
    .bubble { white-space: pre-wrap; word-break: break-word; font-size: 14px; line-height: 1.45; }
    .meta { font-size: 13px; color: #6b7280; }
    a { color: #2563eb; }
  </style>
</head>
<body>
<div class="wrap">
  <a href="/admin/projects/{{ project.id }}/catalog-chats">← К списку диалогов</a>
  <h1>Диалог</h1>
  <p class="meta">Проект: <b>{{ project.name }}</b><br>
    user_id: <code>{{ thread_user_id }}</code><br>
    dialog_id: <code>{{ thread_dialog_id }}</code></p>
  {% for m in chat_messages %}
  <div class="card {{ 'msg-user' if m.role == 'user' else 'msg-assistant' }}">
    <div class="role">{{ m.role }} · {{ m.created_at }}</div>
    <div class="bubble">{{ m.content }}</div>
  </div>
  {% else %}
  <p class="meta">Нет сообщений для этой пары user_id / dialog_id.</p>
  {% endfor %}
</div>
</body>
</html>
