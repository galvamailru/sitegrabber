<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Фильтры каталога</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f5f7fa;margin:0;color:#111}
    .wrap{max-width:1100px;margin:0 auto;padding:24px}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px;margin-bottom:12px}
    input{padding:8px;width:100%}
    table{width:100%;border-collapse:collapse}
    td,th{padding:8px;border-bottom:1px solid #eee;vertical-align:top}
    .btn{padding:10px 14px;background:#2563eb;color:#fff;border:0;border-radius:8px}
  </style>
</head>
<body>
<div class="wrap">
  <a href="/admin/projects/{{ project.id }}">← Назад к проекту</a>
  <h1>Фильтры каталога: {{ project.name }}</h1>
  <form method="post" action="/admin/projects/{{ project.id }}/filters/save" class="card">
    <table>
      <thead><tr><th>Вкл</th><th>Ключ характеристики</th><th>Параметр URL</th><th>Название фильтра</th><th>Вхождений</th></tr></thead>
      <tbody>
      {% for row in keys %}
        <tr>
          <td>
            <input type="checkbox" name="enabled" value="{{ row.key }}" {% if row.enabled %}checked{% endif %}>
            <input type="hidden" name="key" value="{{ row.key }}">
          </td>
          <td>{{ row.key }}</td>
          <td><input name="param_name__{{ row.key }}" value="{{ row.param_name }}"></td>
          <td><input name="display_name__{{ row.key }}" value="{{ row.display_name }}"></td>
          <td>{{ row.count }}</td>
        </tr>
      {% endfor %}
      </tbody>
    </table>
    <br>
    <button type="submit" class="btn">Сохранить настройки фильтров</button>
  </form>
</div>
</body>
</html>
